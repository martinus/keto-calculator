# Deploys the site to GitHub Pages on every push to master.
#
# The repo root IS the website (no build step) — this workflow just strips the
# dev-only files before uploading, so they never become live URLs on
# keto-calculator.ankerl.com. Everything dev-only lives under dev/ (put new
# dev files there and they're excluded automatically); the only root-level
# dev files are the docs listed below.
#
# Requires the repo's Pages setting: Settings → Pages → Source = "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Strip dev-only files from the artifact
        run: rm -rf dev .github CLAUDE.md README.md LICENSE.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
