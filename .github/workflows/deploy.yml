# Verifies the generated files and deploys the site to GitHub Pages.
#
# The repo root IS the website (no build step) — the deploy job just strips the
# dev-only files before uploading, so they never become live URLs on
# keto-calculator.ankerl.com. Everything dev-only lives under dev/ (put new
# dev files there and they're excluded automatically); the only root-level
# dev files are the docs listed below.
#
# de/index.html, embed.html and the three guide pages are GENERATED from
# index.html / dev/guides/ by the dev/build_*.py scripts and committed. The
# verify job re-runs every generator and fails on any diff, so an edit to a
# source that forgot the re-run can never deploy (or merge) a stale copy.
#
# Requires the repo's Pages setting: Settings → Pages → Source = "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate derived files and require a clean tree
        run: |
          python3 dev/build_de.py
          python3 dev/build_embed.py
          python3 dev/build_guides.py
          git diff --exit-code

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify-generated
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Strip dev-only files from the artifact
        run: rm -rf dev .github CLAUDE.md README.md LICENSE.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
